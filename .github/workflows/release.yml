name: Release

# Publish to PyPI and npm when a version tag (`vX.Y.Z`) is pushed.
#
# Supply-chain posture (on-brand for a security-forward tool):
#   * PyPI  — Trusted Publishing (OIDC). No stored API token; the registry
#     verifies a short-lived GitHub OIDC identity instead. Requires a one-time
#     "trusted publisher" config on pypi.org (see RELEASING.md).
#   * npm   — `--provenance`. Generates a signed Sigstore attestation binding
#     the published tarball to this workflow + commit. Uses NODE_AUTH_TOKEN
#     (an npm automation token) as the auth path the roadmap names; npm's own
#     token-free OIDC trusted publishing is documented as an upgrade in
#     RELEASING.md.
#
# A `verify` gate runs BEFORE either publish: it re-runs the full test matrix,
# runs `doctor` (which cross-validates the four in-repo version strings), and
# asserts the pushed git tag matches that version. Publishing is irreversible,
# so a mistagged or red build must never reach a registry.

on:
  push:
    tags:
      - "v*"

# Least privilege at the top; each job widens only what it needs.
permissions:
  contents: read

jobs:
  verify:
    name: Verify (tests + tag/version match)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Tag matches declared version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PY_VERSION="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$TAG" != "$PY_VERSION" ]; then
            echo "::error::Pushed tag '${GITHUB_REF_NAME}' -> '${TAG}' does not match pyproject version '${PY_VERSION}'. Bump the version in all four source files (pyproject.toml, named_subagents/__init__.py, js/package.json, js/named_subagents.mjs) and CHANGELOG.md, then re-tag."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} matches declared version ${PY_VERSION}."

      - name: Python tests
        run: python test_named_subagents.py

      - name: Doctor (cross-validates the four version strings + registry/ledger/parity)
        run: |
          pip install --quiet .
          named-subagents doctor

      - name: Node tests
        run: node js/test_named_subagents.mjs

      - name: Cross-language parity
        run: bash scripts/parity_check.sh

  pypi:
    name: Publish to PyPI (Trusted Publishing)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC — the whole point of Trusted Publishing; no token stored
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        # No `password:` input — the action exchanges the GitHub OIDC token
        # for a short-lived PyPI credential. Configure the trusted publisher
        # on pypi.org first (RELEASING.md), or the first run fails closed.
        uses: pypa/gh-action-pypi-publish@release/v1

  npm:
    name: Publish to npm (with provenance)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for `--provenance` (Sigstore attestation via GitHub OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish
        # `npm publish` runs the `prepack` script first, which copies the
        # canonical registry.json + README.md into js/ (see js/package.json).
        # `--access public` is needed for the first publish of this name.
        working-directory: js
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: [pypi, npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create the release
    steps:
      - uses: actions/checkout@v4
      - name: Publish release notes from CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          # Extract the CHANGELOG section for this version (between its `## [x]`
          # header and the next `## [` header).
          awk -v tag="$TAG" '
            $0 ~ ("^## \\[" tag "\\]") { f=1; next }
            /^## \[/ { f=0 }
            f
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > notes.md
          fi
          gh release create "${GITHUB_REF_NAME}" --title "v${TAG}" --notes-file notes.md
