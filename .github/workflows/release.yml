name: Release

# Publish to PyPI and npm when a version tag (`vX.Y.Z`) is pushed.
#
# Supply-chain posture (on-brand for a security-forward tool): BOTH registries
# use OIDC Trusted Publishing — no stored API token on either side.
#   * PyPI  — Trusted Publishing (OIDC). The registry verifies a short-lived
#     GitHub OIDC identity. One-time "trusted publisher" config on pypi.org.
#   * npm   — Trusted Publishing (OIDC). The npm CLI (>= 11.5.1) exchanges the
#     GitHub OIDC token for a short-lived credential and generates provenance
#     automatically (no NODE_AUTH_TOKEN, no `--provenance` flag). One-time
#     "trusted publisher" config on npmjs.com (see RELEASING.md).
#
# A `verify` gate runs BEFORE either publish: it re-runs the full test matrix,
# runs `doctor` (which cross-validates the four in-repo version strings), and
# asserts the pushed git tag matches that version. Publishing is irreversible,
# so a mistagged or red build must never reach a registry.

on:
  push:
    tags:
      - "v*"

# Least privilege at the top; each job widens only what it needs.
permissions:
  contents: read

jobs:
  verify:
    name: Verify (tests + tag/version match)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Tag matches declared version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PY_VERSION="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$TAG" != "$PY_VERSION" ]; then
            echo "::error::Pushed tag '${GITHUB_REF_NAME}' -> '${TAG}' does not match pyproject version '${PY_VERSION}'. Bump the version in all four source files (pyproject.toml, named_subagents/__init__.py, js/package.json, js/named_subagents.mjs) and CHANGELOG.md, then re-tag."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} matches declared version ${PY_VERSION}."

      - name: Python tests
        run: python test_named_subagents.py

      - name: Doctor (cross-validates the four version strings + registry/ledger/parity)
        run: |
          pip install --quiet .
          named-subagents doctor

      - name: Node tests
        run: node js/test_named_subagents.mjs

      - name: Cross-language parity
        run: bash scripts/parity_check.sh

  pypi:
    name: Publish to PyPI (Trusted Publishing)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC — the whole point of Trusted Publishing; no token stored
      contents: read # a job-level permissions block REPLACES defaults; checkout needs this
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        # No `password:` input — the action exchanges the GitHub OIDC token
        # for a short-lived PyPI credential. Configure the trusted publisher
        # on pypi.org first (RELEASING.md), or the first run fails closed.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent re-runs: don't fail if this version is already on PyPI
          # (e.g. re-releasing a tag after fixing a downstream npm-only failure).
          skip-existing: true

  npm:
    name: Publish to npm (trusted publishing)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC — trusted publishing exchanges this for a short-lived credential; also drives provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Use a trusted-publishing-capable npm (>= 11.5.1)
        # node 20 ships npm 10.x, which predates OIDC trusted publishing. Upgrade
        # explicitly so this doesn't silently regress if the bundled npm changes.
        run: npm install -g npm@latest
      - name: Publish
        # Trusted publishing: NO NODE_AUTH_TOKEN — the npm CLI exchanges the GitHub
        # OIDC token for a short-lived credential and generates provenance
        # automatically (no `--provenance` flag). Configure the trusted publisher on
        # npmjs.com FIRST (RELEASING.md) or this fails closed. `prepack` copies the
        # canonical registry.json + README into js/ before packing.
        working-directory: js
        run: npm publish --access public

  github-release:
    name: Create GitHub Release
    needs: [pypi, npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create the release
    steps:
      - uses: actions/checkout@v4
      - name: Publish release notes from CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          # Extract the CHANGELOG section for this version (between its `## [x]`
          # header and the next `## [` header).
          awk -v tag="$TAG" '
            $0 ~ ("^## \\[" tag "\\]") { f=1; next }
            /^## \[/ { f=0 }
            f
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > notes.md
          fi
          gh release create "${GITHUB_REF_NAME}" --title "v${TAG}" --notes-file notes.md
