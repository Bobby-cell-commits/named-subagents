name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.8", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Unit tests
        run: python tests/test_named_subagents.py
      - name: Auto-namer hook tests
        run: python tests/test_hook.py
      - name: Resolution accuracy eval
        run: python tests/eval_resolution.py
      - name: Demo smoke
        run: python examples/demo.py > /dev/null
      - name: Install smoke (wheel ships registry.json + py.typed)
        run: |
          pip install --quiet .
          named-subagents --version
          named-subagents allocate --category explore --count 3
          python -c "import named_subagents, os; d = os.path.dirname(named_subagents.__file__); r = named_subagents.Registry.load(); assert r.total_names() >= 395, r.total_names(); assert os.path.exists(os.path.join(d, 'py.typed')), 'py.typed missing from installed wheel'; print('registry + py.typed OK from installed package')"
      - name: Hook works from the installed package (the exact registered invocation)
        run: |
          printf '%s' '{"tool_name":"Agent","tool_input":{"description":"map auth","prompt":"do it","subagent_type":"Explore"}}' \
            | NAMED_SUBAGENTS_LEDGER="$RUNNER_TEMP/hook-ledger.json" python -m named_subagents hook run \
            | python -c "import sys, json; ui = json.load(sys.stdin)['hookSpecificOutput']['updatedInput']; assert ui['description'].endswith('map auth'), ui; assert 'parallel agents in this run.' in ui['prompt']; print('python -m named_subagents hook run OK from installed wheel')"
          named-subagents hook status --settings "$RUNNER_TEMP/probe-settings.json"
      - name: Doctor
        run: named-subagents doctor

  node:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Unit tests
        run: node js/test_named_subagents.mjs
      - name: Auto-namer hook tests
        run: node js/test_hook.mjs
      - name: Demo smoke
        run: node js/demo.mjs > /dev/null
      - name: Pack smoke (prepack copies canonical registry)
        working-directory: js
        run: |
          npm pack --dry-run
          test -f registry.json && cmp registry.json ../named_subagents/registry.json

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: TypeScript surface check (.d.ts exercised by types_test.ts)
        # No install step: run tsc straight from the registry via npx, keeping
        # the package's zero-dependency posture (typescript is not even a devDep).
        working-directory: js
        run: npx -y -p typescript@5 tsc -p tsconfig.json

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Cross-language parity
        run: bash scripts/parity_check.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Ruff lint (config + rationale in pyproject.toml [tool.ruff])
        run: |
          python -m pip install --quiet ruff
          ruff check .

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Library-core line coverage
        # Gates the library core (named_subagents/__init__.py). The floor + the
        # cli.py exclusion (it's exercised only via subprocess, invisible to
        # in-process line coverage) live in pyproject.toml [tool.coverage].
        run: |
          python -m pip install --quiet coverage
          coverage run -p --source=named_subagents tests/test_named_subagents.py > /dev/null
          coverage run -p --source=named_subagents tests/test_hook.py > /dev/null
          coverage run -p --source=named_subagents tests/eval_resolution.py > /dev/null
          coverage combine
          coverage report
